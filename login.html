<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Unificada CRM</title>
    <!-- Anti-Cache Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=8">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
        }
        .login-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card .logo {
            justify-content: center;
            margin-bottom: 2rem;
        }
        .login-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            text-align: left;
        }
        .error-msg {
            color: #B91C1C;
            background: #FEE2E2;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="logo.png" alt="Clínica Unificada Logo" class="brand-logo-large">
        </div>
        <h2>Acesso Restrito</h2>
        <p>Faça login para acessar o painel de gestão.</p>
        
        <div class="error-msg" id="errorMsg">Usuário ou senha incorretos.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Usuário</label>
                <input type="text" id="email" required placeholder="Ex: unificada">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btnLogin">Entrar</button>
        </form>
    </div>

    <!-- Supabase JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js?v=2"></script>
</body>
</html>
