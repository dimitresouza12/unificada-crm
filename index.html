<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Unificada - CRM</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2818/2818366.png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="topbar">
            <div class="logo">
                <i class="ph ph-tooth"></i>
                <h1>Clínica Unificada</h1>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Painel</a>
            </nav>
            <div class="user-profile">
                <div class="avatar">CU</div>
                <div class="user-info">
                    <span class="name">Recepção</span>
                    <span class="role">Admin</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div class="page-header">
                <h2>Pacientes & Agendamentos</h2>
                <div class="header-actions">
                    <button class="btn btn-primary" id="btnNovoAgendamento">
                        <i class="ph ph-plus"></i> Novo Agendamento
                    </button>
                    <button class="btn btn-secondary" id="btnExportar">
                        <i class="ph ph-export"></i> Exportar
                    </button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-card">
                <div class="table-header">
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Buscar paciente...">
                    </div>
                </div>
                <div class="table-container">
                    <table id="patientsTable">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Telefone</th>
                                <th>Procedimento</th>
                                <th>Status</th>
                                <th>Data/Hora</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows will be populated by app.js -->
                            <tr>
                                <td colspan="5" class="loading-state">Carregando dados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <span class="results-count" id="resultsCount">Mostrando 0 resultados</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main App Logic -->
    <script src="app.js?v=5"></script>
</body>
</html>
