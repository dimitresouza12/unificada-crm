<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Unificada - CRM</title>
    <!-- Anti-Cache Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#7C3AED">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="topbar">
            <div class="logo">
                <img src="logo.png" alt="Clínica Unificada Logo" class="brand-logo">
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Painel</a>
            </nav>
            <div class="user-profile">
                <div class="avatar">CU</div>
                <div class="user-info">
                    <span class="name">Recepção</span>
                    <button id="btnLogout" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; text-align:left; text-decoration:underline;">Sair do Sistema</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div class="page-header">
                <h2>Pacientes & Agendamentos</h2>
                <div class="header-actions">
                    <button class="btn btn-primary" id="btnNovoAgendamento">
                        <i class="ph ph-plus"></i> Novo Agendamento
                    </button>
                    <button class="btn btn-secondary" id="btnExportar">
                        <i class="ph ph-export"></i> Exportar
                    </button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-card">
                <div class="table-header">
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Buscar paciente...">
                    </div>
                </div>
                <div class="table-container">
                    <table id="patientsTable">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Telefone</th>
                                <th>Procedimento</th>
                                <th>Status</th>
                                <th>Data da Conversa</th>
                                <th>Data Agendamento</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows will be populated by app.js -->
                            <tr>
                                <td colspan="6" class="loading-state">Carregando dados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <span class="results-count" id="resultsCount">Mostrando 0 resultados</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Novo Agendamento -->
    <div id="modalNovoAgendamento" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Novo Agendamento</h3>
                <button class="btn-close" id="btnCloseModal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="formNovoAgendamento">
                    <div class="form-group">
                        <label for="inputNome">Nome do Paciente</label>
                        <input type="text" id="inputNome" required placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-group">
                        <label for="inputTelefone">Telefone / WhatsApp</label>
                        <input type="text" id="inputTelefone" required placeholder="Ex: 5588999999999">
                    </div>
                    <div class="form-group">
                        <label for="inputProcedimento">Procedimento</label>
                        <input type="text" id="inputProcedimento" required placeholder="Ex: Avaliação Geral">
                    </div>
                    <div class="form-group">
                        <label for="inputStatus">Status</label>
                        <select id="inputStatus" required>
                            <option value="Agendado">Agendado</option>
                            <option value="Pendente">Pendente</option>
                            <option value="Concluído">Concluído</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputData">Data e Hora</label>
                        <input type="datetime-local" id="inputData" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="btnCancelModal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="btnSalvarAgendamento">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main App Logic -->
    <script src="app.js?v=7"></script>
</body>
</html>
